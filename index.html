<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheduly 月排班</title>
  <style>
    :root { --bg:#111318; --card:#1b1f27; --text:#eef2ff; --muted:#9aa4bd; --accent:#60a5fa; --holiday:#f59e0b; --leave:#22c55e; --line:#2a3140; }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1200px;margin:0 auto;padding:20px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    button,select,input{background:#161b22;border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:8px}
    button{cursor:pointer}
    .tag{padding:4px 10px;border-radius:999px;font-size:12px}
    .free{background:#1d4ed822}.pro{background:#7c3aed22}
    .grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-top:16px}
    .weekday,.day{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;min-height:120px}
    .weekday{min-height:auto;text-align:center;color:var(--muted);font-size:12px}
    .day .date{font-size:12px;color:var(--muted)}
    .day.holiday{outline:2px solid var(--holiday)} .day.leave{outline:2px solid var(--leave)}
    .shift{font-size:12px;margin-top:8px;padding:4px 6px;border-radius:6px;background:#243042}
    .panel{margin-top:18px;background:var(--card);border:1px solid var(--line);padding:14px;border-radius:12px}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .feature{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    ul{margin:0;padding-left:18px}.muted{color:var(--muted)}
    @media (max-width:900px){.cols,.feature{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="top">
    <h1 id="title"></h1>
    <div class="row">
      <button id="prevMonth">◀</button>
      <strong id="monthLabel"></strong>
      <button id="nextMonth">▶</button>
      <select id="lang">
        <option value="zh">繁中</option><option value="en">EN</option><option value="ja">日本語</option>
      </select>
    </div>
  </div>

  <div class="row" style="margin-top:10px">
    <span class="tag free" id="freeTag"></span>
    <span class="tag pro" id="proTag"></span>
  </div>

  <div class="grid" id="weekHeader"></div>
  <div class="grid" id="calendar"></div>

  <div class="panel cols">
    <div>
      <h3 id="holidayTitle"></h3>
      <p class="muted" id="holidayHint"></p>
      <div class="row" style="margin-top:8px">
        <input type="date" id="holidayDate" />
        <button id="addHoliday"></button>
      </div>
    </div>
    <div>
      <h3 id="leaveTitle"></h3>
      <p class="muted" id="leaveHint"></p>
      <div class="row" style="margin-top:8px">
        <select id="staff"><option>Alice</option><option>Bob</option><option>Carol</option></select>
        <input type="date" id="leaveDate" />
        <button id="addLeave"></button>
      </div>
    </div>
  </div>

  <div class="panel feature">
    <div>
      <h3 id="freeTitle"></h3>
      <ul id="freeList"></ul>
    </div>
    <div>
      <h3 id="proTitle"></h3>
      <ul id="proList"></ul>
    </div>
  </div>
</div>

<script>
const i18n = {
  zh: {
    title:'Scheduly 月視圖排班', freeTag:'免費版', proTag:'進階版', holiday:'假日設定', holidayHint:'在日期上加上假日標記。',
    leave:'個人休假設定', leaveHint:'設定員工在特定日期休假。', addHoliday:'新增假日', addLeave:'新增休假',
    freeTitle:'免費版功能', proTitle:'進階版功能', weekdays:['日','一','二','三','四','五','六'], month:'月',
    freeFeatures:['排班','排班驗證','員工資料','班次設定','假日設定','個人休假設定','適用法律基本規則'],
    proFeatures:['自動排班','自動修正','多人上限解除','進階法規規則','多地點','多角色限制']
  },
  en: {
    title:'Scheduly Monthly Scheduler', freeTag:'Free', proTag:'Advanced', holiday:'Holiday Settings', holidayHint:'Mark holidays on specific dates.',
    leave:'Personal Leave', leaveHint:'Set leave for individual staff by date.', addHoliday:'Add Holiday', addLeave:'Add Leave',
    freeTitle:'Free Features', proTitle:'Advanced Features', weekdays:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], month:'Month',
    freeFeatures:['Scheduling','Schedule Validation','Employee Profiles','Shift Setup','Holiday Setup','Personal Leave Setup','Basic Legal Rules'],
    proFeatures:['Auto Scheduling','Auto Repair','Higher Capacity','Advanced Legal Rules','Multi-location','Multi-role Constraints']
  },
  ja: {
    title:'Scheduly 月次シフト', freeTag:'無料版', proTag:'上級版', holiday:'祝日設定', holidayHint:'日付に祝日マークを追加します。',
    leave:'個人休暇設定', leaveHint:'従業員ごとの休暇日を設定します。', addHoliday:'祝日追加', addLeave:'休暇追加',
    freeTitle:'無料版機能', proTitle:'上級版機能', weekdays:['日','月','火','水','木','金','土'], month:'月',
    freeFeatures:['シフト作成','シフト検証','従業員情報','シフト設定','祝日設定','個人休暇設定','基本労務ルール'],
    proFeatures:['自動シフト','自動修正','人数上限解除','高度な法規ルール','複数拠点','複数ロール制限']
  }
};
let state = { lang:'zh', current:new Date(), holidays:new Set(), leaves:new Map() };
const el = id => document.getElementById(id);
function applyText(){
  const t=i18n[state.lang];
  el('title').textContent=t.title; el('freeTag').textContent=t.freeTag; el('proTag').textContent=t.proTag;
  el('holidayTitle').textContent=t.holiday; el('holidayHint').textContent=t.holidayHint; el('addHoliday').textContent=t.addHoliday;
  el('leaveTitle').textContent=t.leave; el('leaveHint').textContent=t.leaveHint; el('addLeave').textContent=t.addLeave;
  el('freeTitle').textContent=t.freeTitle; el('proTitle').textContent=t.proTitle;
  el('freeList').innerHTML=t.freeFeatures.map(x=>`<li>${x}</li>`).join('');
  el('proList').innerHTML=t.proFeatures.map(x=>`<li>${x}</li>`).join('');
}
function fmt(d){ return d.toISOString().slice(0,10); }
function renderCalendar(){
  const t=i18n[state.lang], d=new Date(state.current.getFullYear(), state.current.getMonth(), 1);
  const year=d.getFullYear(), month=d.getMonth();
  el('monthLabel').textContent = `${year} / ${month+1} ${t.month}`;
  el('weekHeader').innerHTML = t.weekdays.map(w=>`<div class="weekday">${w}</div>`).join('');
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push('<div class="day" style="opacity:.35"></div>');
  for(let day=1;day<=daysInMonth;day++){
    const date = new Date(year,month,day); const key=fmt(date);
    const holiday = state.holidays.has(key); const leaveStaff = state.leaves.get(key);
    const cls = `day ${holiday?'holiday':''} ${leaveStaff?'leave':''}`;
    cells.push(`<div class="${cls}"><div class="date">${month+1}/${day}</div>${holiday?'<div class="shift">🎉 Holiday</div>':''}${leaveStaff?`<div class="shift">🛌 ${leaveStaff}</div>`:''}<div class="shift">早班 / 晚班</div></div>`);
  }
  el('calendar').innerHTML = cells.join('');
}
el('lang').addEventListener('change',e=>{state.lang=e.target.value;applyText();renderCalendar();});
el('prevMonth').addEventListener('click',()=>{state.current=new Date(state.current.getFullYear(),state.current.getMonth()-1,1);renderCalendar();});
el('nextMonth').addEventListener('click',()=>{state.current=new Date(state.current.getFullYear(),state.current.getMonth()+1,1);renderCalendar();});
el('addHoliday').addEventListener('click',()=>{if(el('holidayDate').value){state.holidays.add(el('holidayDate').value);renderCalendar();}});
el('addLeave').addEventListener('click',()=>{if(el('leaveDate').value){state.leaves.set(el('leaveDate').value,el('staff').value);renderCalendar();}});
applyText(); renderCalendar();
</script>
</body>
</html>
